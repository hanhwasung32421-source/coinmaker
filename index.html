<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Maker</title>
    <style>
:root{
  --bg:#0b0f17;
  --panel:#111826;
  --text:#e7eefc;
  --muted:rgba(231,238,252,.65);
  --accent:#0abf7f;

  --card-w:400px;
  --card-h:423px;
  --card-pad:24px;
  --top-main:8px;
  --top-profit:52px;
  --section-top:108px;
  --row-gap:72px;
  --label-to-value:25px;
  --side-gap:0px;
  --percent-sign-top:2px;
  --green:#0abf7f;
  --red:#fa4b4b;
  --value:#ffffff;
  --label:#a6a6a6;
}

@font-face{
  font-family:"Noto Sans KR";
  src:url("./Noto_Sans_KR/static/NotoSansKR-Regular.ttf") format("truetype");
  font-weight:400;
  font-style:normal;
  font-display:swap;
}
@font-face{
  font-family:"Noto Sans KR";
  src:url("./Noto_Sans_KR/static/NotoSansKR-Medium.ttf") format("truetype");
  font-weight:500;
  font-style:normal;
  font-display:swap;
}
@font-face{
  font-family:"Noto Sans KR";
  src:url("./Noto_Sans_KR/static/NotoSansKR-Bold.ttf") format("truetype");
  font-weight:600;
  font-style:normal;
  font-display:swap;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Noto Sans KR", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.topbar{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(11,15,23,.9);
  backdrop-filter: blur(8px);
}
.topbar-left{ font-weight:800; font-size:13px; color:rgba(231,238,252,.92); }
.topbar-right{ font-size:12px; color:rgba(231,238,252,.72); }
.topbar-right span{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; color:rgba(231,238,252,.92); }

.app{
  display:grid;
  grid-template-columns: 520px 600px;
  justify-content:start;
  gap:24px;
  padding:24px;
  align-items:start;
}

.preview{
  display:flex;
  flex-direction:column;
  gap:12px;
  position:sticky;
  top:16px;
  align-self:start;
  max-height:calc(100vh - 32px);
  overflow:auto;
}

.card-shell,.generate-wrap,.preset-wrap,.controls,.copied-preview-wrap{
  background:#0e1522;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
}

.card-shell{ padding:16px; width:fit-content; }
.hint,.generate-hint,.preset-title,.phrase-settings,.notes,.copied-preview-title{ color:var(--muted); font-size:12px; line-height:1.4; }
.generate-wrap,.preset-wrap,.copied-preview-wrap{ padding:14px 16px; display:grid; gap:10px; }
.controls{
  padding:18px;
  position:sticky;
  top:16px;
  max-height:calc(100vh - 32px);
  overflow:auto;
  width:600px;
  min-width:600px;
  max-width:600px;
}
.controls h1{ margin:0 0 14px; font-size:18px; font-weight:700; }

.grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
label{ display:grid; gap:6px; font-size:12px; color:var(--muted); }
label input, label textarea{ width:100%; }
input, textarea{
  width:100%;
  padding:10px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:#0c1220;
  color:var(--text);
  font-size:14px;
  outline:none;
}
input:disabled{ background:#2a2f3a; color:rgba(231,238,252,.78); }
textarea{ resize:vertical; font-size:12px; white-space:pre; }
input:focus, textarea:focus{ border-color:rgba(10,191,127,.7); box-shadow:0 0 0 3px rgba(10,191,127,.12); }

button{
  cursor:pointer;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  padding:10px 12px;
  font-size:14px;
  color:var(--text);
  background:#0c1220;
}
button.primary{ background:rgba(10,191,127,.16); border-color:rgba(10,191,127,.45); }
button.secondary{ background:#0c1220; }
.actions,.zoom-stepper,.bg-move-row,.side-toggle{ display:flex; gap:8px; }
.actions{ flex-wrap:wrap; margin-top:14px; }
.zoom-stepper button,.side-btn{ flex:1; }
.side-btn.active{ background:rgba(10,191,127,.18); border-color:rgba(10,191,127,.55); }
.bg-move{ display:grid; gap:8px; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.08); background:#0c1220; }
.bg-move-row{ justify-content:center; }
.bg-shift-inputs,.cloud-actions,.phrase-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.span-2{ grid-column:1 / -1; }
.preset-grid{ display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
.preset-btn{ width:100%; white-space:nowrap; }
.preset-caption{ min-height:34px; padding:2px 4px; font-size:12px; line-height:1.2; color:rgba(231,238,252,.85); display:flex; align-items:center; justify-content:center; text-align:center; user-select:text; }

.toast{
  position:fixed; left:16px; bottom:16px; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.12);
  background:rgba(10,191,127,.16); color:#d8ffe7; font-size:13px; opacity:0; transform:translateY(6px); pointer-events:none;
  transition:opacity .15s ease, transform .15s ease; z-index:9999;
}
.toast.show{ opacity:1; transform:translateY(0); }
.center-tip{
  position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(.98); padding:18px 22px; border-radius:16px;
  border:2px solid rgba(255,255,255,.22); background:rgba(250,75,75,.20); color:#e7eefc; font-size:28px; font-weight:900; opacity:0; pointer-events:none;
  transition:opacity .15s ease, transform .15s ease; z-index:9999; text-align:center; min-width:320px;
}
.center-tip.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }

/* DOM 카드 */
.el-dialog{ width:var(--card-w); margin:0 auto; }
.el-dialog__header{ display:flex; justify-content:flex-end; align-items:center; height:12px; }
.el-dialog__body{ padding:0; }

.dgb-content{ position:relative; width:100%; height:100%; }
.dgbc-r-2{ position:absolute; left:0; top:0; width:100%; }
.dr2-value,.dr3-value,.drp-label,.drp-value{ margin:0; text-align:left; word-break:break-all; }
.dr2-value{
  color:var(--green); font-size:32px; font-weight:500; line-height:1.15; position:absolute; left:0; top:var(--top-main); width:100%;
}
.plus-sign{ display:inline; font-size:32px; font-weight:500; }
.percent-sign{ display:inline; font-size:34px; font-weight:600; line-height:1; margin-left:1px; position:relative; top:var(--percent-sign-top); }
.dr3-value{
  color:var(--green); font-size:20px; font-weight:400; line-height:1.35; position:absolute; left:0; top:var(--top-profit); width:100%;
}
.dr3-value .plus-sign{ font-size:20px; font-weight:400; }
.dgbcr_r_price_area{ position:absolute; left:0; top:var(--section-top); width:100%; height:calc(100% - var(--section-top)); }
.dgbc-r-prices{ position:absolute; left:0; width:100%; }
.dgbc-r-prices:nth-child(1){ top:0; }
.dgbc-r-prices:nth-child(2){ top:var(--row-gap); }
.dgbc-r-prices:nth-child(3){ top:calc(var(--row-gap) * 2); }
.dgbc-r-prices:nth-child(4){ top:calc(var(--row-gap) * 3); }
.drp-label{ color:var(--label); font-size:16px; font-weight:400; line-height:22px; position:absolute; left:0; top:0; width:100%; }
.drp-value{ color:var(--value); font-size:20px; font-weight:600; line-height:28px; position:absolute; left:0; top:var(--label-to-value); width:100%; }
.dgbc-r-prices:first-child .drp-value{ font-size:18px; line-height:26px; }
.dgbc-r-prices:nth-child(n+2) .drp-value{ font-size:18px; line-height:25px; }
.dr1-tt{ display:inline; margin-left:var(--side-gap); font-size:18px; font-weight:600; line-height:26px; }
.dr1-tt.LONG{ color:var(--green); }
.dr1-tt.SHORT{ color:var(--red); }

@media (max-width:1500px){
  .app{ grid-template-columns:520px 600px; }
  .sidepanel{ grid-column:1 / -1; }
}
@media (max-width:1160px){
  .app{ grid-template-columns:1fr; }
  .controls{ width:100%; min-width:0; max-width:none; }
}

</style>

  <body>
    <div class="topbar">
      <div class="topbar-left">Coin Maker</div>
      <div class="topbar-right">버전 <span id="buildVersion">260623164458</span></div>
    </div>
    <div class="app">
      <div class="preview">
        <div class="card-shell">
          <div class="el-dialog">
            <div class="el-dialog__header">
              <span class="el-dialog__title"></span>
            </div>
            <div class="el-dialog__body">
              <div class="dg-body cursor-pointer" id="cardRoot">
                <div class="dgb-content">
                  <div class="dgbc-r-2">
                    <p class="dr2-value">
                      <span class="plus-sign">+</span><span id="txtPercent">19.75</span><span class="percent-sign">%</span>
                    </p>
                    <p class="dr3-value">
                      <span class="plus-sign">+</span><span id="txtProfit">10,229,614 WON</span>
                    </p>
                  </div>

                  <div class="dgbcr_r_price_area">
                    <div class="dgbc-r-prices">
                      <p class="drp-label">코인</p>
                      <p class="drp-value">
                        <span id="txtSymbol">DOGE/USDT</span>
                        <span id="txtSide" class="dr1-tt SHORT">SHORT</span>
                      </p>
                    </div>

                    <div class="dgbc-r-prices">
                      <p class="drp-label">레버리지</p>
                      <p id="txtLeverage" class="drp-value">100x</p>
                    </div>

                    <div class="dgbc-r-prices">
                      <p class="drp-label">진입가격</p>
                      <p id="txtEntry" class="drp-value">0.08608</p>
                    </div>

                    <div class="dgbc-r-prices">
                      <p class="drp-label">종료가격</p>
                      <p id="txtExit" class="drp-value">0.08591</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="hint">C는 DOM 기반 렌더링 후 캡처하는 방식입니다. A/B는 그대로 유지됩니다.</div>
        <div class="hint">복사가 안 되면 브라우저 보안 정책 때문일 수 있어요. 권장: 로컬 서버로 열기(예: <code>python -m http.server 8000 --directory c:\trae</code>)</div>
        <div class="generate-wrap">
          <button id="btnGenerate" class="primary" type="button">생성</button>
          <div class="generate-hint">오른쪽에서 “생성 개수”를 입력한 뒤 생성 버튼을 누르세요.</div>
        </div>
      </div>

      <div class="controls">
        <h1>수치 조정</h1>

        <div class="grid">
          <label>수익률 최소<input id="inpPercentMin" type="text" value="20" /></label>
          <label>수익률 최대<input id="inpPercentMax" type="text" value="25" /></label>
          <label>최소 수익금 (만원)<input id="inpProfitMin" type="text" value="300" /></label>
          <label>최대 수익금 (만원)<input id="inpProfitMax" type="text" value="1000" /></label>
          <label>코인 텍스트<input id="inpSymbol" type="text" value="DOGE/USDT" /></label>
          <label>
            포지션(LONG/SHORT)
            <div class="side-toggle" role="group" aria-label="포지션 선택">
              <button id="btnSideLong" class="secondary side-btn" type="button">LONG</button>
              <button id="btnSideShort" class="secondary side-btn" type="button">SHORT</button>
              <input id="inpSide" type="hidden" value="" />
            </div>
          </label>
          <label>진입가격 / 실제진입가(자동)
            <div class="dual-input">
              <input id="inpEntry" type="text" value="0.11445" />
              <input id="inpEntryReal" type="text" value="0.11445" disabled />
            </div>
          </label>
          <label>종료가격(자동)<input id="inpExit" type="text" value="0.00000" disabled /></label>
          <label>레버리지<input id="inpLeverage" type="text" value="100x" /></label>
          <label>배경 확대/축소 (0.50~2.00, 1.00=기본)
            <input id="inpBgZoom" type="number" step="0.001" min="0.5" max="2" value="1.000" />
            <div class="zoom-stepper">
              <button id="btnZoomOut" class="secondary" type="button">축소 -0.1%</button>
              <button id="btnZoomIn" class="secondary" type="button">확대 +0.1%</button>
            </div>
          </label>

          <div class="bg-move span-2">
            <div class="bg-move-row"><button id="btnShiftUp" class="secondary" type="button">위 1px</button></div>
            <div class="bg-move-row">
              <button id="btnShiftLeft" class="secondary" type="button">왼쪽 1px</button>
              <button id="btnShiftReset" class="secondary" type="button">원점</button>
              <button id="btnShiftRight" class="secondary" type="button">오른쪽 1px</button>
            </div>
            <div class="bg-move-row"><button id="btnShiftDown" class="secondary" type="button">아래 1px</button></div>
            <div class="bg-shift-inputs">
              <label class="mini">배경 X<input id="inpBgShiftX" type="number" step="1" value="0" /></label>
              <label class="mini">배경 Y<input id="inpBgShiftY" type="number" step="1" value="28" /></label>
            </div>
          </div>

          <label>생성 개수<input id="inpCount" type="number" min="1" step="1" value="1" /></label>
          <label>파일명 접두사<input id="inpPrefix" type="text" value="screenshot" /></label>
        </div>

        <div class="actions">
          <button id="btnDownloadZip" class="primary" type="button">ZIP로 대량 생성</button>
          <button id="btnReroll" class="secondary" type="button">랜덤 갱신</button>
          <button id="btnReset" class="secondary" type="button">기본값</button>
        </div>

        <div class="cloud-actions">
          <button id="btnCloudLoad" class="secondary" type="button">클라우드 불러오기</button>
          <button id="btnCloudSave" class="secondary" type="button">클라우드 저장</button>
        </div>
      </div>

      
    </div>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>
    <div id="centerTip" class="center-tip" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
